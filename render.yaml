services:
  - type: web
    name: lyrics-studio
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable pnpm && pnpm install && turbo run build --filter=web
    startCommand: node apps/web/.next/standalone/apps/web/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GENIUS_API_TOKEN
        sync: false
      - key: ALIGNMENT_SERVICE_URL
        sync: false
      - key: ALIGNMENT_WEBHOOK_SECRET
        sync: false
